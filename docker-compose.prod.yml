services:
  api-gateway:
    ports:
      - "80:8000"
    environment:
      - LOG_LEVEL: WARNING

  writer-service:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  invetory-service:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  notification-service:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  postgres:
    restart: always

  redis:
    restart: always

  rabbitmq:
    restart: always
    image: rabbitmq:3-alpine  
