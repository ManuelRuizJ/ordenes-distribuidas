name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create environment file
        run: |
          if [ "${{ matrix.environment }}" = "dev" ]; then
            cp .env.example .env.dev
            echo "LOG_LEVEL=DEBUG" >> .env.dev
          else
            # staging
            echo "POSTGRES_USER=orders_stg" > .env.staging
            echo "POSTGRES_PASSWORD=${{ secrets.STAGING_POSTGRES_PASSWORD }}" >> .env.staging
            echo "POSTGRES_DB=orders_stagging" >> .env.staging
            echo "DATABASE_URL=postgresql+asyncpg://orders_stg:${{ secrets.STAGING_POSTGRES_PASSWORD }}@postgres:5432/orders_stagging" >> .env.staging
            echo "REDIS_URL=redis://redis:6379/0" >> .env.staging
            echo "WRITER_SERVICE_URL=http://writer-service:8001" >> .env.staging
            echo "RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/" >> .env.staging
            echo "WRITER_TIMEOUT_SECONDS=1.0" >> .env.staging
            echo "WRITER_MAX_RETRIES=1" >> .env.staging
            echo "SMTP_HOST=smtp.gmail.com" >> .env.staging
            echo "SMTP_PORT=587" >> .env.staging
            echo "SMTP_USER=jeshua0423@gmail.com" >> .env.staging
            echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" >> .env.staging
            echo "EMAIL_FROM=jeshua0423@gmail.com" >> .env.staging
            echo "EMAIL_TO=jeshua0423@gmail.com" >> .env.staging
            echo "NOTIFICATIONS_DB_USER=notifications_stg" >> .env.staging
            echo "NOTIFICATIONS_DB_NAME=notifications_stg_db" >> .env.staging
            echo "NOTIFICATIONS_DATABASE_URL=postgresql+asyncpg://notifications_stg:${{ secrets.STAGING_POSTGRES_PASSWORD }}@postgres-notification:5432/notifications_stg_db" >> .env.staging
            echo "LOG_LEVEL=INFO" >> .env.staging
            echo "JWT_SECRET_KEY=${{ secrets.STAGING_JWT_SECRET_KEY }}" >> .env.staging
            echo "JWT_ALGORITHM=HS256" >> .env.staging
            echo "ACCESS_TOKEN_EXPIRE_MINUTES=30" >> .env.staging
            echo "REFRESH_TOKEN_EXPIRE_DAYS=2" >> .env.staging
            echo "AUTH_DB_USER=auth_user" >> .env.staging
            echo "AUTH_DB_PASSWORD=${{ secrets.STAGING_AUTH_DB_PASSWORD }}" >> .env.staging
            echo "AUTH_DB_NAME=auth_db" >> .env.staging
            echo "AUTH_DATABASE_URL=postgresql+asyncpg://auth_user:${{ secrets.STAGING_AUTH_DB_PASSWORD }}@postgres-users:5432/auth_db" >> .env.staging
          fi
          cp .env.${{ matrix.environment }} .env

      - name: Build services
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for services
        run: sleep 60

      - name: Run integration tests
        run: |
          chmod +x ./scripts/test.sh
          ./scripts/test.sh

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Cleanup
        if: always()
        run: docker compose down -v

      - name: Linter check
        run: |
          echo "Ejecutando linters..."
          pip install ruff
          ruff check .