name: CI                        # Nombre del workflow

on: 
    push:
        branches: [ main ]          # Ramas en las que se ejecutara el workflow
    pull_request:
        branches: [ main ]

jobs:
    build:
        runs-on: ubuntu-latest
        timeout-minutes: 10

    steps:
        - name: Checkout_code
            uses: actions/checkout@v4

        - name: Build_all_services
            run: docker compose build 

        - name: Start_services
            run: |
            cp .env.example .env
            docker compose -f docker-compose.yml -f docker-compose.dev.yml --env-file .env up --build -d

        - name: Wait for services to be healthy
            run: |
            echo "Esperando a que los servicios esten healthy..."
            timeout 120 bash -c '
                until docker compose ps --format json | python3 -c "
                import sys, json
                services = [json.loads(line) for line in sys.stdin]
                unhealthy = [s[\"Name\"] for s in services if s.get(\"Health\") not in [\"healthy\", \"\"]]
                if unhealthy:
                    print(f\"Esperando: {unhealthy}\")
                    sys.exit(1)
                print(f\"Todos los servicios estan saludables")
                "; do
                    sleep 5
                done
            '
        - name: Run_integration_tests
            run: |
                chmod +x ./scripts/test.sh
                ./scripts/test.sh

        - name: Show_logs_on_failure
            if: failure()
            run: docker compose logs --tail=100

        - name: Cleanup
            if: always()
            run: docker compose down -v